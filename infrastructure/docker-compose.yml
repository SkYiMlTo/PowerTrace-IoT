services:
  # ── MQTT Broker ─────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: powerdetect-dataset-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  # ── TimescaleDB (PostgreSQL) ───────────────────────────
  timescaledb:
    image: timescale/timescaledb:2.15.3-pg16
    container_name: powerdetect-dataset-timescaledb
    environment:
      POSTGRES_DB: ${PGDATABASE}
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER} -d ${PGDATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── pgAdmin ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: powerdetect-dataset-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "8081:80"
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  # ── Node-RED (Data Logger + Attack Injection) ───────────
  nodered:
    build: ./nodered
    container_name: powerdetect-dataset-nodered
    ports:
      - "1880:1880"
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - PGHOST=timescaledb
      - PGPORT=5432
      - PGDATABASE=${PGDATABASE}
      - PGUSER=${PGUSER}
      - PGPASSWORD=${PGPASSWORD}
    depends_on:
      mosquitto:
        condition: service_started
      timescaledb:
        condition: service_healthy
    volumes:
      - nodered_data:/data
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
  timescaledb_data:
  nodered_data:
